<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - RecycleRaja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <!-- 🔐 PASSWORD PROTECTION -->
  <script>
  const ADMIN_PASSWORD = "Recycle@123";

  let userPass = prompt("Enter Admin Password");

  if (!userPass || userPass !== ADMIN_PASSWORD) {
    alert("Access Denied ❌");
    window.location.href = "index.html";
  }
</script>

</head>
<body>

<h1 style="text-align:center;">Admin Panel 🔐</h1>

<!-- 📊 STATS -->
<section style="text-align:center; margin:20px;">
  <h2>Total Vendors: <span id="totalVendors">0</span></h2>
</section>

<!-- ➕ ADD VENDOR -->
<section class="form-section">
  <div class="form-box">
    <h2>Add Vendor</h2>

    <form id="adminForm">
      <input type="text" id="name" placeholder="Vendor Name" required>
      <input type="text" id="phone" placeholder="Phone" required>
      <input type="text" id="area" placeholder="Area" required>
      <input type="text" id="pincode" placeholder="Pincode" required>
      <input type="text" id="vid" placeholder="Vendor ID" required>
      <input type="password" id="passField" placeholder="Password" required>

      <button type="submit" class="cta-btn">Add Vendor</button>
    </form>
  </div>
</section>

<!-- 📋 VENDOR LIST -->
<section class="form-section">
  <div class="form-box">
    <h2>All Vendors</h2>
    <div id="vendorList"></div>
  </div>
</section>

<script src="admin.js"></script>

</body>
</html>
