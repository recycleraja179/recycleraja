<!DOCTYPE html>
<html>
<head>
  <title>Vendor Join - RecycleRaja</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">♻️ RecycleRaja</h1>
</header>

<section class="form-section">
  <div class="form-box">
    <h2>Join as Vendor</h2>

    <form id="vendorForm">
      <input id="name" placeholder="Name" required>
      <input id="phone" placeholder="Phone" required>
      <input id="area" placeholder="Area" required>
      <input id="pincode" placeholder="Pincode" required>
      <input id="vendorId" placeholder="Create ID" required>
      <input id="password" placeholder="Password" required>

      <button type="submit">Register</button>
    </form>
  </div>
</section>

<script type="module" src="vendor.js"></script>
</body>
</html>
