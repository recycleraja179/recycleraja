<!DOCTYPE html>
<html>
<head>
  <title>Vendor Join - RecycleRaja</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">♻️ RecycleRaja</h1>
  <a href="index.html" class="btn">Home</a>
</header>

<section class="form-section">
  <div class="form-box">
    <h2>Join as Vendor 🧑‍🔧</h2>

    <form id="vendorForm">
      <input type="text" id="name" placeholder="Vendor Name" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>
      <input type="text" id="area" placeholder="Area (e.g. Ameerpet)" required>
      <input type="text" id="pincode" placeholder="Pincode" required>

      <button type="submit" class="cta-btn">Register</button>
    </form>
  </div>
</section>

<script src="../js/vendor.js"></script>

</body>
</html>
